# ConfigWatcher 应用配置文件
# 路径配置

[Paths]
# 配置文件搜索目录
ConfigSearchPath=~/.config/Leichen
# 数据库文件路径
DatabasePath=~/.config/ConfigWatcher/configwatcher.db
# 日志文件路径
LogPath=~/.config/log/configwatcher.log

[Security]
# 默认用户名
DefaultUsername=admin
# 密码最小长度
MinPasswordLength=6
# 会话超时时间（分钟）
SessionTimeout=30

[UI]
# 窗口默认尺寸
DefaultWidth=1200
DefaultHeight=800
# 每页显示结果数
PageSize=100
# 最大搜索结果
MaxSearchResults=500

[Performance]
# 异步导入文件数量限制
MaxImportFiles=1000
# 搜索超时（毫秒）
SearchTimeout=5000
